<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Login</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: #0b1120;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .boxShadow {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      }
      input::placeholder {
        color: #ffffffa0;
      }
    </style>
  </head>
  <body>
    <section id="login" class="w-100">
      <div class="container">
        <div class="login-content text-center w-75 m-auto p-5 boxShadow">
          <div class="header pb-4">
            <h1>Smart Login</h1>
          </div>

          <div class="mb-3">
            <label for="emailInput" class="form-label visually-hidden"
              >Email</label
            >
            <input
              type="email"
              id="emailInput"
              class="form-control text-white mb-4 bg-transparent"
              placeholder="Enter your email"
            />
            <p
              id="EmailError"
              class="bg-danger text-center p-1 text-white d-none bg-opacity-75"
            >
              Email not Valid
            </p>
            <label for="passwordInput" class="form-label visually-hidden"
              >Password</label
            >
            <input
              type="password"
              id="passwordInput"
              class="form-control text-white mb-4 bg-transparent"
              placeholder="Enter your password"
            />
            <p
              id="passwordError"
              class="bg-danger text-center p-1 text-white d-none bg-opacity-75"
            >
              Password must be 6 Charcaters
            </p>
          </div>

          <div class="submit-btn mb-3">
            <button
              id="loginbtn"
              class="btn btn-primary text-white w-50 d-block mx-auto"
            >
              LogIn
            </button>
          </div>

          <div class="account mt-3">
            <p class="text-white" id="signUpBtn">
              Already have an account?
              <a class="text-decoration-none text-white" href="signup.html"
                >Sign Up</a
              >
            </p>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
